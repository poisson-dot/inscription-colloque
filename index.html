<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Inscription au colloque</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: white;
}

img {
  width: 60vw; /* grand format */
  max-width: 600px;
  display: none;
  border-radius: 16px;
  margin-top: 20px;
}

/* clignotement */
.blink {
  animation: blink-animation 0.7s infinite;
}

@keyframes blink-animation {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

button {
  margin-top: 25px;
  padding: 12px 24px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: none;
}
</style>
</head>
<body>

<h1 id="titre">Inscription en cours...</h1>
<p id="texte">Analyse de votre niveau de motivation scientifique...</p>

<img id="cyril" src="cyril.jpg" alt="Cyril">

<button id="retry" onclick="moreCyril()">Se réinscrire</button>

<script>
setTimeout(function() {
  document.getElementById("titre").innerHTML = "Votre place a disparu à cause du grand magicien Cyril Tomate";
  document.getElementById("texte").innerHTML =
    "Cyril TOMATE vous remercie pour votre participation à l’étude sur la disparition des places.";

  let img = document.getElementById("cyril");
  img.style.display = "block";
  img.classList.add("blink");

  document.getElementById("retry").style.display = "inline-block";
}, 5000);

function moreCyril() {
  document.getElementById("titre").innerHTML = "Nouvelle tentative impossible.";
  document.getElementById("texte").innerHTML =
    "Votre seconde inscription a également été captée par Cyril.";

  let img = document.getElementById("cyril");
  img.style.width = "80vw"; /* encore plus grand */
}
</script>

</body>
</html>
